<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معاني الكلمات</title>
    <style>
        :root {
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-word: #2ecc71;
            --text-labels: #27ae60;
            --text-content: #1a1a1a;
            --input-bg: #ffffff;
            --shadow: 0 10px 25px rgba(0,0,0,0.05);
            --footer-color: #94a3b8;
        }

        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-word: #2ecc71;
            --text-labels: #4ade80;
            --text-content: #f8fafc;
            --input-bg: #334155;
            --shadow: 0 10px 30px rgba(0,0,0,0.4);
            --footer-color: #64748b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-content);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            direction: rtl;
            transition: background 0.3s;
        }

        .app-container {
            width: 95%;
            max-width: 600px;
            padding: 40px 0;
            flex-grow: 1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .search-container {
            position: relative;
            display: flex;
            gap: 10px;
            margin-bottom: 5px;
        }

        input#wordInput {
            flex: 1;
            padding: 16px 20px;
            border-radius: 14px;
            border: 2px solid transparent;
            font-size: 1.1rem;
            background: var(--input-bg);
            color: var(--text-content);
            outline: none;
            box-shadow: var(--shadow);
        }

        button#searchBtn {
            padding: 0 25px;
            border-radius: 14px;
            border: none;
            background: var(--text-word);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            left: 0;
            background: var(--bg-card);
            border-radius: 12px;
            box-shadow: var(--shadow);
            z-index: 1000;
            margin-top: 8px;
            display: none;
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid rgba(0,0,0,0.1);
        }

        .dropdown-item {
            padding: 12px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .dropdown-item:hover { background: rgba(46, 204, 113, 0.1); color: var(--text-word); }

        .history-icon {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: #888;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .result-card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            margin-top: 30px;
            border-right: 8px solid var(--text-word);
            animation: fadeIn 0.4s ease;
        }

        .result-card h2 { color: var(--text-word); font-size: 2.2rem; margin: 0 0 20px 0; }
        .sentence-box { margin-bottom: 25px; }
        .label { display: block; color: var(--text-labels); font-weight: bold; margin-bottom: 5px; }
        .content { font-size: 1.4rem; line-height: 1.7; display: block; }

        .loader {
            display: none;
            width: 30px;
            height: 30px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--text-word);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        footer { padding: 20px; font-size: 0.8rem; color: var(--footer-color); text-align: center; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>معاني الكلمات</h1>
        <button onclick="toggleTheme()" id="themeBtn" style="background:var(--bg-card); border:1px solid #ddd; padding:8px 15px; border-radius:20px; cursor:pointer; color:var(--text-content); font-weight:bold;">الوضع الليلي</button>
    </div>

    <div class="search-container">
        <input type="text" id="wordInput" placeholder="ابحث عن كلمة..." autocomplete="off">
        <button id="searchBtn" onclick="handleSearch()">بحث</button>
        <div id="dropdownMenu" class="dropdown-menu"></div>
    </div>

    <div id="loader" class="loader"></div>
    <div id="resultArea"></div>
</div>

<footer>
    سياسة الخصوصية: يتم حفظ تفضيلاتك وسجل بحثك محلياً فقط.
</footer>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwRF6ZycN-hWpqWu2LW3LaU3Bgf7mQhJeORX6xKiXJ0EKInKU6weTgfZYrANBDt6Lnc/exec";
    const input = document.getElementById('wordInput');
    const dropdown = document.getElementById('dropdownMenu');
    const resultArea = document.getElementById('resultArea');
    const loader = document.getElementById('loader');

    // ✅ FIX: flag يمنع فتح القائمة بعد البحث مباشرة
    let suppressDropdown = false;

    const historyIconSVG = `<svg class="history-icon" viewBox="0 0 24 24"><path d="M12 8V12L15 15" /><circle cx="12" cy="12" r="9" /><path d="M3.05 11a9 9 0 0 1 .5-2M3.05 11H1V5" transform="translate(0,0)"/></svg>`;

    function applySavedTheme() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('themeBtn').innerText = savedTheme === 'dark' ? "الوضع النهاري" : "الوضع الليلي";
    }

    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        document.getElementById('themeBtn').innerText = newTheme === 'dark' ? "الوضع النهاري" : "الوضع الليلي";
    }

    function getHistory() { return JSON.parse(localStorage.getItem('searchHistory') || '[]'); }

    function addToHistory(word) {
        let history = getHistory().filter(w => w !== word);
        history.unshift(word);
        localStorage.setItem('searchHistory', JSON.stringify(history.slice(0, 7)));
    }

    function closeDropdown() {
        dropdown.style.display = 'none';
        dropdown.innerHTML = '';
    }

    // ✅ FIX: لا تفتح القائمة إذا كان suppressDropdown مفعّلاً
    input.addEventListener('focus', () => {
        if (suppressDropdown) return;
        if (!input.value.trim()) showHistory();
    });

    input.addEventListener('input', async () => {
        // ✅ FIX: أي كتابة جديدة تلغي الـ suppress
        suppressDropdown = false;

        const val = input.value.trim().toLowerCase();
        if (!val) { showHistory(); return; }
        if (val.length < 2) { closeDropdown(); return; }

        try {
            const res = await fetch(`${API_URL}?suggest=${encodeURIComponent(val)}`);
            const suggestions = await res.json();
            const filtered = suggestions.filter(s => s.toLowerCase().startsWith(val));
            renderDropdown(filtered, 'suggest-item');
        } catch (e) { console.error("API error"); }
    });

    function showHistory() {
        const history = getHistory();
        if (history.length > 0) renderDropdown(history, 'history-item');
        else closeDropdown();
    }

    function renderDropdown(items, className) {
        dropdown.innerHTML = '';
        if (items.length === 0) { closeDropdown(); return; }
        
        items.forEach(item => {
            const div = document.createElement('div');
            div.className = `dropdown-item ${className}`;
            div.innerHTML = (className === 'history-item' ? historyIconSVG : '') + `<span>${item}</span>`;
            div.onclick = () => {
                input.value = item;
                closeDropdown();
                handleSearch();
            };
            dropdown.appendChild(div);
        });
        dropdown.style.display = 'block';
    }

    async function handleSearch() {
        const query = input.value.trim();
        if (!query) return;

        // ✅ FIX: أغلق القائمة وامنع إعادة فتحها عند البحث
        suppressDropdown = true;
        closeDropdown();
        input.blur(); // أزل الفوكس عن الـ input لمنع حدث focus من إعادة فتح القائمة

        resultArea.innerHTML = '';
        loader.style.display = 'block';

        try {
            const res = await fetch(`${API_URL}?q=${encodeURIComponent(query)}`);
            const data = await res.json();
            loader.style.display = 'none';

            if (data.found) {
                addToHistory(data.word);
                resultArea.innerHTML = `
                    <div class="result-card">
                        <h2>${data.word}</h2>
                        <div class="sentence-box">
                            <span class="label">الجملة الأولى:</span>
                            <span class="content">${data.sentence1 || ''}</span>
                        </div>
                        <div class="sentence-box">
                            <span class="label">الجملة الثانية:</span>
                            <span class="content">${data.sentence2 || ''}</span>
                        </div>
                    </div>
                `;
            } else {
                resultArea.innerHTML = `<p style="text-align:center; opacity:0.6;">الكلمة غير موجودة.</p>`;
            }
        } catch (e) {
            loader.style.display = 'none';
            resultArea.innerHTML = `<p style="color:red; text-align:center;">خطأ في الاتصال.</p>`;
        }
    }

    applySavedTheme();

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-container')) closeDropdown();
    });

    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') { handleSearch(); }
    });
</script>
</body>
</html>
