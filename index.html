<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قاموسي الشخصي المطور</title>
    <style>
        /* تعريف الألوان والمتغيرات المعدلة */
        :root {
            --bg-color: #f0f4f8;
            --container-bg: #ffffff;
            --text-color: #2d3436;
            --primary-color: #2ecc71; /* أخضر فاتح للعنوان */
            --secondary-color: #00a8ff; /* أزرق مشرق للجمل */
            --shadow: 0 10px 25px rgba(0,0,0,0.1);
            --card-bg: #ffffff;
            --input-bg: #ffffff;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #f5f6fa;
            --primary-color: #55efc4; /* أخضر أفتح للوضع الليلي */
            --secondary-color: #48dbfb; /* أزرق مشرق جداً */
            --card-bg: #2d2d2d;
            --input-bg: #3d3d3d;
            --shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background 0.3s ease;
            direction: rtl; /* التأكد من اتجاه الصفحة بالكامل */
        }

        .container {
            width: 95%;
            max-width: 600px;
            background: var(--container-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        h1 { font-size: 1.8rem; margin: 0; }

        .theme-toggle {
            background: var(--primary-color);
            border: none;
            color: #fff;
            padding: 8px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        /* حقل البحث */
        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 35px;
        }

        input {
            flex: 2;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 1.1rem;
            background: var(--input-bg);
            color: var(--text-color);
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--secondary-color);
            outline: none;
        }

        button#searchBtn {
            flex: 1;
            padding: 15px;
            background-color: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button#searchBtn:active { transform: scale(0.95); }

        /* تنسيق الـ Card */
        #resultArea { margin-top: 25px; }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            text-align: right; /* محاذاة لليمين */
            border-right: 8px solid var(--primary-color);
            animation: slideUp 0.4s ease-out;
        }

        .card h2 { 
            margin-top: 0; 
            color: var(--primary-color); 
            font-size: 2rem; /* تكبير اسم الكلمة */
            margin-bottom: 15px;
        }

        .card p { 
            line-height: 1.8; 
            margin: 12px 0; 
            font-size: 1.2rem; /* تكبير خط الجمل */
            color: var(--secondary-color); /* الجمل بالأزرق المشرق */
            font-weight: 500;
        }

        .error { color: #ff7675; font-size: 1.1rem; font-weight: bold; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* الموبايل */
        @media (max-width: 480px) {
            .search-box { flex-direction: column; }
            h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>قاموسي الشخصي</h1>
        <button class="theme-toggle" id="themeBtn">الوضع الليلي</button>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="ابحث عن كلمة...">
        <button id="searchBtn">بحث</button>
    </div>

    <div id="resultArea">
        </div>
</div>

<script>
    const sheetId = '1DLTYDgoPf_OPMi-vjp6Fx7JJN4_PNdRrBT8vMICrc1Q';
    const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`;

    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const resultArea = document.getElementById('resultArea');
    const themeBtn = document.getElementById('themeBtn');

    // تبديل الثيم
    themeBtn.addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        if (currentTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'light');
            themeBtn.innerText = 'الوضع الليلي';
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeBtn.innerText = 'الوضع النهاري';
        }
    });

    async function searchWord() {
        const query = searchInput.value.trim().toLowerCase();
        if (!query) return;

        resultArea.innerHTML = '<p>جاري البحث عن الكلمة...</p>';

        try {
            const response = await fetch(csvUrl);
            const data = await response.text();
            
            // تقسيم الأسطر مع مراعاة الفواصل
            const rows = data.split('\n').map(row => row.split(','));
            
            // البحث (العمود الأول للكلمة)
            const foundRow = rows.find(row => row[0] && row[0].trim().toLowerCase() === query);

            if (foundRow) {
                // عرض النتيجة بالتنسيق الجديد
                resultArea.innerHTML = `
                    <div class="card">
                        <h2>${foundRow[0]}</h2>
                        <p>${foundRow[1] || ''}</p>
                        <p>${foundRow[2] || ''}</p>
                    </div>
                `;
            } else {
                resultArea.innerHTML = '<p class="error">الكلمة غير موجودة في قاعدتنا</p>';
            }
        } catch (error) {
            resultArea.innerHTML = '<p class="error">عذراً، فشل الاتصال بقاعدة البيانات</p>';
        }
    }

    searchBtn.addEventListener('click', searchWord);
    searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') searchWord();
    });
</script>

</body>
    </html>
