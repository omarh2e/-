<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معاني الكلمات</title>
    <style>
        :root {
            --bg-body: #ffffff; 
            --bg-card: #ffffff;
            --text-word: #2ecc71;
            --text-labels: #27ae60;
            --text-content: #1a1a1a;
            --input-bg: #f8fafc; 
            --input-border: #e2e8f0; 
            --btn-blue: #3b82f6; 
            --theme-btn-text: #000000; /* نص أسود في الوضع الفاتح */
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-word: #2ecc71;
            --text-labels: #4ade80;
            --text-content: #f8fafc;
            --input-bg: #ffffff; 
            --input-border: transparent;
            --theme-btn-text: #ffffff; /* نص أبيض في الوضع الداكن */
            --shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-content);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            direction: rtl;
            transition: background 0.3s;
        }

        .app-container {
            width: 95%;
            max-width: 600px;
            padding: 40px 0;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        #themeBtn {
            background: rgba(150, 150, 150, 0.1);
            border: 1px solid var(--input-border);
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            color: var(--theme-btn-text); /* تطبيق لون النص المطلوب */
            transition: all 0.3s;
        }

        .search-container {
            position: relative;
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input#wordInput {
            flex: 1;
            padding: 16px 20px;
            border-radius: 14px;
            border: 2px solid var(--input-border);
            background: var(--input-bg);
            color: #000000;
            outline: none;
            box-shadow: var(--shadow);
        }

        #searchBtn {
            padding: 0 25px;
            border-radius: 14px;
            border: none;
            background: var(--btn-blue);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .result-card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            margin-top: 20px;
            border-right: 8px solid var(--text-word);
            animation: fadeIn 0.4s ease;
        }

        .result-card h2 { color: var(--text-word); margin: 0 0 15px 0; }
        .label { display: block; color: var(--text-labels); font-weight: bold; margin-bottom: 5px; }
        .content { font-size: 1.2rem; line-height: 1.6; }

        /* Suggestion Section at the very bottom */
        .suggest-section {
            margin-top: auto; 
            padding: 40px 0;
            text-align: center;
            width: 100%;
        }

        .suggest-box {
            display: flex;
            gap: 8px;
            justify-content: center;
            max-width: 450px;
            margin: 10px auto 0;
        }

        .suggest-input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            color: #000;
            outline: none;
        }

        .send-btn {
            background: var(--btn-blue);
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>معاني الكلمات</h1>
        <button onclick="toggleTheme()" id="themeBtn">الوضع المظلم</button>
    </div>

    <div class="search-container">
        <input type="text" id="wordInput" placeholder="أكتب كلمة..." autocomplete="off">
        <button id="searchBtn" onclick="handleSearch()">بحث</button>
    </div>

    <div id="resultArea"></div>

    <div class="suggest-section" id="suggestArea">
        <p style="opacity: 0.7; font-size: 0.9rem;">هل لديك كلمة جديدة؟ ساعدنا في التطوير</p>
        <div class="suggest-box">
            <input type="text" id="newWordInput" class="suggest-input" placeholder="اكتب الكلمة هنا...">
            <button onclick="sendNewWord()" id="sendBtn" class="send-btn">ارسال</button>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwRF6ZycN-hWpqWu2LW3LaU3Bgf7mQhJeORX6xKiXJ0EKInKU6weTgfZYrANBDt6Lnc/exec";

    function applySavedTheme() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('themeBtn').innerText = savedTheme === 'dark' ? "الوضع الفاتح" : "الوضع المظلم";
    }

    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        document.getElementById('themeBtn').innerText = newTheme === 'dark' ? "الوضع الفاتح" : "الوضع المظلم";
    }

    async function handleSearch() {
        const input = document.getElementById('wordInput');
        const resultArea = document.getElementById('resultArea');
        const query = input.value.trim();
        if (!query) return;

        resultArea.innerHTML = '<p style="text-align:center;">جاري البحث...</p>';

        try {
            const res = await fetch(`${API_URL}?q=${encodeURIComponent(query)}`);
            const data = await res.json();
            if (data.found) {
                resultArea.innerHTML = `
                    <div class="result-card">
                        <h2>${data.word}</h2>
                        <div class="sentence-box">
                            <span class="label">الجملة الأولى:</span>
                            <span class="content">${data.sentence1 || ''}</span>
                        </div>
                        <div class="sentence-box">
                            <span class="label">الجملة الثانية:</span>
                            <span class="content">${data.sentence2 || ''}</span>
                        </div>
                    </div>`;
            } else {
                resultArea.innerHTML = `<p style="text-align:center; opacity:0.6;">الكلمة غير موجودة.</p>`;
            }
        } catch (e) {
            resultArea.innerHTML = `<p style="color:red; text-align:center;">خطأ في الاتصال.</p>`;
        }
    }

    async function sendNewWord() {
        const wordInput = document.getElementById('newWordInput');
        const suggestArea = document.getElementById('suggestArea');
        const word = wordInput.value.trim();
        if (!word) return;

        // ملاحظة: يجب وضع رابط Google Form الحقيقي هنا ليعمل الإرسال
        const formURL = "https://docs.google.com/forms/d/e/YOUR_FORM_ID/formResponse";
        const entryID = "entry.123456789"; 

        const formData = new FormData();
        formData.append(entryID, word);

        try {
            fetch(formURL, { method: "POST", mode: "no-cors", body: formData });
            suggestArea.innerHTML = `
                <div style="animation: fadeIn 0.5s; color: var(--text-labels); font-weight: bold; padding: 20px;">
                    شكراً لك على مساعدة في تطوير موقعنا. ❤️
                </div>`;
        } catch (e) {
            alert("حدث خطأ");
        }
    }

    applySavedTheme();
</script>
</body>
</html>
