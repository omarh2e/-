<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معاني الكلمات</title>
    <style>
        :root {
            --bg-body: #ffffff; 
            --bg-card: #ffffff;
            --text-word: #2ecc71;
            --text-labels: #27ae60;
            --text-content: #1a1a1a;
            --input-bg: #f8fafc; 
            --input-border: #e2e8f0; 
            --btn-blue: #3b82f6; 
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-word: #2ecc71;
            --text-labels: #4ade80;
            --text-content: #f8fafc;
            --input-bg: #ffffff; 
            --input-border: transparent;
            --btn-blue: #3b82f6;
            --shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-content);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            direction: rtl;
            transition: background 0.3s;
        }

        .app-container {
            width: 95%;
            max-width: 600px;
            padding: 40px 0;
            flex-grow: 1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .search-container {
            position: relative;
            display: flex;
            gap: 10px;
            margin-bottom: 5px;
        }

        input#wordInput {
            flex: 1;
            padding: 16px 20px;
            border-radius: 14px;
            border: 2px solid var(--input-border);
            font-size: 1.1rem;
            background: var(--input-bg);
            color: #000000; 
            outline: none;
            box-shadow: var(--shadow);
        }

        button#searchBtn {
            padding: 0 25px;
            border-radius: 14px;
            border: none;
            background: var(--btn-blue);
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: var(--shadow);
        }

        .result-card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            margin-top: 30px;
            border-right: 8px solid var(--text-word);
            animation: fadeIn 0.4s ease;
        }

        /* Suggestion Button Style */
        .suggest-section {
            margin-top: 50px;
            text-align: center;
            padding-bottom: 40px;
        }

        .suggest-btn {
            background: none;
            border: 2px dashed var(--btn-blue);
            color: var(--btn-blue);
            padding: 10px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .suggest-btn:hover {
            background: var(--btn-blue);
            color: white;
            border-style: solid;
        }

        .loader {
            display: none;
            width: 30px;
            height: 30px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--btn-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>معاني الكلمات</h1>
        <button onclick="toggleTheme()" id="themeBtn" style="background: rgba(59, 130, 246, 0.1); border: 1.5px solid rgba(59, 130, 246, 0.4); padding:8px 15px; border-radius:20px; cursor:pointer; color: var(--btn-blue); font-weight:bold;">الوضع المظلم</button>
    </div>

    <div class="search-container">
        <input type="text" id="wordInput" placeholder="أكتب كلمة..." autocomplete="off">
        <button id="searchBtn" onclick="handleSearch()">بحث</button>
        <div id="dropdownMenu" class="dropdown-menu"></div>
    </div>

    <div id="loader" class="loader"></div>
    <div id="resultArea"></div>

    <div class="suggest-section">
        <p style="opacity: 0.7; font-size: 0.9rem; margin-bottom: 10px;">لم تجد الكلمة؟</p>
        <a href="رابط_نموذج_جوجل_الخاص_بك" target="_blank" class="suggest-btn">اقترح كلمة جديدة</a>
    </div>
</div>

<script>
    /* ... نفس الكود البرمجي السابق بدون تغيير ... */
    const API_URL = "https://script.google.com/macros/s/AKfycbwRF6ZycN-hWpqWu2LW3LaU3Bgf7mQhJeORX6xKiXJ0EKInKU6weTgfZYrANBDt6Lnc/exec";
    const input = document.getElementById('wordInput');
    const resultArea = document.getElementById('resultArea');
    const loader = document.getElementById('loader');

    function applySavedTheme() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('themeBtn').innerText = savedTheme === 'dark' ? "الوضع الفاتح" : "الوضع المظلم";
    }

    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        document.getElementById('themeBtn').innerText = newTheme === 'dark' ? "الوضع الفاتح" : "الوضع المظلم";
    }

    async function handleSearch() {
        const query = input.value.trim();
        if (!query) return;
        input.blur();
        resultArea.innerHTML = ''; 
        loader.style.display = 'block';

        try {
            const res = await fetch(`${API_URL}?q=${encodeURIComponent(query)}`);
            const data = await res.json();
            loader.style.display = 'none';

            if (data.found) {
                resultArea.innerHTML = `
                    <div class="result-card">
                        <h2>${data.word}</h2>
                        <div class="sentence-box">
                            <span class="label">الجملة الأولى:</span>
                            <span class="content">${data.sentence1 || ''}</span>
                        </div>
                        <div class="sentence-box">
                            <span class="label">الجملة الثانية:</span>
                            <span class="content">${data.sentence2 || ''}</span>
                        </div>
                    </div>
                `;
            } else {
                resultArea.innerHTML = `<p style="text-align:center; opacity:0.6;">عذراً، الكلمة غير موجودة.</p>`;
            }
        } catch (e) {
            loader.style.display = 'none';
            resultArea.innerHTML = `<p style="color:red; text-align:center;">حدث خطأ في الاتصال.</p>`;
        }
    }
    applySavedTheme();
</script>
</body>
</html>
