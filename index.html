<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معاني الكلمات</title>
    <style>
        :root {
            /* ألوان الوضع الفاتح */
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-word: #2ecc71;
            --text-labels: #27ae60;
            --text-content: #1a1a1a;
            /* ألوان الشريط الجديدة */
            --search-bg: #ffffff;
            --search-text: #1a1a1a;
            --search-border: #e2e8f0;
            --suggestion-bg: #ffffff;
            --suggestion-hover: #f1f5f9;
            --suggestion-text: #1a1a1a;
            /* ألوان الأزرار والظلال */
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --primary-shadow: 0 4px 14px 0 rgba(46, 204, 113, 0.3);
            --footer-color: #94a3b8;
        }

        [data-theme="dark"] {
            /* ألوان الوضع الداكن */
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-word: #2ecc71;
            --text-labels: #4ade80;
            --text-content: #f8fafc;
            /* ألوان الشريط الجديدة - وضع داكن */
            --search-bg: #334155;
            --search-text: #f8fafc;
            --search-border: #475569;
            --suggestion-bg: #334155;
            --suggestion-hover: #475569;
            --suggestion-text: #f8fafc;
            /* ألوان الظلال - وضع داكن */
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.7), 0 10px 10px -5px rgba(0, 0, 0, 0.5);
            --primary-shadow: 0 4px 14px 0 rgba(46, 204, 113, 0.5);
            --footer-color: #64748b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-content);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            direction: rtl;
            transition: background 0.3s;
        }

        .app-container {
            width: 95%;
            max-width: 600px;
            padding: 40px 0;
            flex-grow: 1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        /* حاوية البحث */
        .search-container {
            position: relative;
            display: flex;
            gap: 10px;
            margin-bottom: 5px;
        }

        /* مدخل البحث - تم تعديله ليتطابق مع الصورة */
        input#wordInput {
            flex: 1;
            padding: 16px 20px;
            border-radius: 14px; /* زوايا مدورة أكثر */
            border: 2px solid var(--search-border); /* حدود واضحة */
            font-size: 1.1rem;
            background: var(--search-bg); /* خلفية متغيرة حسب الوضع */
            color: var(--search-text);
            outline: none;
            box-shadow: var(--shadow); /* ظل خفيف */
            transition: 0.3s;
        }

        input#wordInput:focus {
            border-color: var(--text-word); /* لون أخضر عند التركيز */
        }

        /* زر البحث */
        button#searchBtn {
            padding: 0 25px;
            border-radius: 14px;
            border: none;
            background: var(--text-word);
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: var(--primary-shadow);
            transition: 0.3s;
        }

        button#searchBtn:hover {
            opacity: 0.9;
        }

        /* قائمة الاقتراحات - تم تعديلها لتتطابق مع الصورة */
        .dropdown-menu {
            position: absolute;
            top: 100%; /* تظهر أسفل شريط البحث */
            right: 0;
            left: 0;
            background: var(--suggestion-bg); /* خلفية متغيرة حسب الوضع */
            border-radius: 12px;
            box-shadow: var(--shadow-lg); /* ظل بارز */
            z-index: 1000;
            margin-top: 8px; /* مسافة بين الشريط والقائمة */
            display: none; /* مخفية افتراضياً */
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid rgba(0,0,0,0.1); /* حدود خفيفة */
        }

        .dropdown-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: 0.2s;
            color: var(--suggestion-text);
        }

        .dropdown-item:hover {
            background: var(--suggestion-hover); /* خلفية عند التمرير */
            color: var(--text-word); /* لون نص أخضر */
        }

        /* نتائج البحث */
        .result-card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: var(--shadow-md);
            margin-top: 30px;
            border-right: 8px solid var(--text-word); /* خط أخضر على اليمين */
            animation: slideUp 0.4s ease;
        }

        .result-card h2 {
            color: var(--text-word);
            font-size: 2.2rem;
            margin: 0 0 20px 0;
        }

        .sentence-box {
            margin-bottom: 25px;
        }

        .label {
            display: block;
            color: var(--text-labels);
            font-weight: bold;
            margin-bottom: 5px;
        }

        .content {
            font-size: 1.4rem;
            line-height: 1.7;
            display: block;
        }

        /* تبديل الوضع */
        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid #ddd;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            color: var(--text-content);
            box-shadow: var(--shadow);
            transition: 0.3s;
        }

        .theme-toggle:hover {
            opacity: 0.8;
        }

        [data-theme="dark"] .theme-toggle {
            border-color: #475569;
        }

        /* أنيميشن */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        footer {
            padding: 20px;
            font-size: 0.8rem;
            color: var(--footer-color);
            text-align: center;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>معاني الكلمات</h1>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">الوضع الليلي</button>
    </div>

    <div class="search-container">
        <input type="text" id="wordInput" placeholder="ابحث عن كلمة..." autocomplete="off">
        <button id="searchBtn" onclick="handleSearch()">بحث</button>
        <div id="dropdownMenu" class="dropdown-menu"></div>
    </div>

    <div id="resultArea"></div>
</div>

<footer>
    تم تطوير القاموس بواسطة narh2e.github.io
</footer>

<script>
    const input = document.getElementById('wordInput');
    const dropdown = document.getElementById('dropdownMenu');
    const resultArea = document.getElementById('resultArea');

    // بيانات وهمية للبحث والاقتراحات
    const dictionary = {
        "نظام": {
            word: "نظام",
            sentences: [
                { label: "الجملة الأولى:", content: "الهاتف يشتغل بنظام اندرويد" },
                { label: "الجملة الثانية:", content: "هذا النظام الغذائي إنه صحي" }
            ]
        },
        "التفاحة": {
            word: "التفاحة",
            sentences: [
                { label: "الجملة الأولى:", content: "سمير أكل التفاحة الحمراء" },
                { label: "الجملة الثانية:", content: "اغسل التفاحة قبل أن تأكلها" }
            ]
        }
    };

    // عرض القائمة المنسدلة عند الكتابة
    input.addEventListener('input', () => {
        const value = input.value.trim().toLowerCase();
        dropdown.innerHTML = '';
        if (value.length > 0) {
            const filteredWords = Object.keys(dictionary).filter(word => word.toLowerCase().startsWith(value));
            if (filteredWords.length > 0) {
                filteredWords.forEach(word => {
                    const div = document.createElement('div');
                    div.className = 'dropdown-item';
                    div.textContent = word;
                    div.onclick = () => {
                        input.value = word;
                        dropdown.style.display = 'none';
                        handleSearch();
                    };
                    dropdown.appendChild(div);
                });
                dropdown.style.display = 'block';
            } else {
                dropdown.style.display = 'none';
            }
        } else {
            dropdown.style.display = 'none';
        }
    });

    // إغلاق القائمة المنسدلة عند الضغط خارجها
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-container')) {
            dropdown.style.display = 'none';
        }
    });

    // معالجة البحث
    function handleSearch() {
        const query = input.value.trim();
        dropdown.style.display = 'none';
        resultArea.innerHTML = ''; // مسح النتائج السابقة

        if (dictionary[query]) {
            const data = dictionary[query];
            const resultCard = document.createElement('div');
            resultCard.className = 'result-card';

            const wordTitle = document.createElement('h2');
            wordTitle.textContent = data.word;
            resultCard.appendChild(wordTitle);

            data.sentences.forEach(sentence => {
                const sentenceBox = document.createElement('div');
                sentenceBox.className = 'sentence-box';

                const labelSpan = document.createElement('span');
                labelSpan.className = 'label';
                labelSpan.textContent = sentence.label;
                sentenceBox.appendChild(labelSpan);

                const contentSpan = document.createElement('span');
                contentSpan.className = 'content';
                contentSpan.textContent = sentence.content;
                sentenceBox.appendChild(contentSpan);

                resultCard.appendChild(sentenceBox);
            });

            resultArea.appendChild(resultCard);
        } else if (query.length > 0) {
            resultArea.innerHTML = `<p style="text-align:center; opacity:0.6;">لم يتم العثور على معنى للكلمة "${query}".</p>`;
        }
    }

    // تبديل الوضع
    function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', newTheme);
        document.getElementById('themeBtn').innerText = newTheme === 'dark' ? "الوضع النهاري" : "الوضع الليلي";
        localStorage.setItem('theme', newTheme); // حفظ التفضيل
    }

    // تطبيق السمة المحفوظة عند التحميل
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) {
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('themeBtn').innerText = savedTheme === 'dark' ? "الوضع النهاري" : "الوضع الليلي";
    }

</script>

</body>
</html>
