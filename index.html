<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معاني الكلمات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #ffffff; 
            --bg-card: #ffffff;
            --text-word: #2ecc71;
            --text-labels: #27ae60;
            --text-content: #1a1a1a;
            --input-bg: #f8fafc; 
            --input-border: #e2e8f0; 
            --btn-green: #2ecc71; /* لون زر البحث الأخضر */
            --theme-btn-border: #000000;
            --theme-btn-text: #000000;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-word: #2ecc71;
            --text-labels: #4ade80;
            --text-content: #f8fafc;
            --input-bg: #334155; 
            --input-border: #475569;
            --theme-btn-border: #ffffff;
            --theme-btn-text: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-content);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center; /* توسيط المحتوى أفقياً */
            min-height: 100vh;
            direction: rtl;
            transition: background 0.3s;
        }

        .app-container {
            width: 90%;
            max-width: 650px; /* العرض الأقصى للتطبيق */
            padding: 40px 0;
            display: flex;
            flex-direction: column;
            align-items: center; /* يضمن توسيط العناصر الداخلية */
        }

        /* الهيدر: يمتد لعرض الحاوية ليضع الزر في أقصى اليسار */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%; 
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.2rem;
            margin: 0;
        }

        #themeBtn {
            background: transparent;
            border: 1px solid var(--theme-btn-border);
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            color: var(--theme-btn-text);
            transition: 0.3s;
        }

        /* --- تعديل منطقة البحث لتصبح أصغر وفي المنتصف --- */
        .search-container {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            height: 55px;
            width: 100%;
            max-width: 480px; /* تصغير العرض كما طلبت ليكون في المنتصف */
            align-items: stretch;
            justify-content: center;
        }

        input#wordInput {
            flex: 1;
            padding: 0 20px;
            border-radius: 14px;
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            color: var(--text-content);
            outline: none;
            box-shadow: var(--shadow);
            font-size: 1.1rem;
            min-width: 0; /* لمنع التمدد غير المرغوب في الهواتف */
        }

        #searchBtn {
            padding: 0 25px;
            border-radius: 14px;
            border: none;
            background: var(--btn-green); /* الحفاظ على اللون الأخضر */
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: var(--shadow);
            white-space: nowrap;
        }

        /* باقي التنسيقات (اللودر والبطاقة) */
        .loader-wrapper { display: none; text-align: center; margin: 30px auto; }
        .dad-loader { font-family: 'Tajawal', sans-serif; font-size: 80px; color: var(--text-word); animation: pulseDad 1.5s infinite; font-weight: 700; }
        @keyframes pulseDad { 0%, 100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.1); opacity: 1; } }

        .result-card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            width: 100%; /* تأخذ عرض الحاوية الأقصى 650px */
            box-sizing: border-box;
            border-right: 10px solid var(--text-word);
            animation: slideUp 0.4s ease;
        }
        .result-card h2 { color: var(--text-word); font-size: 2.2rem; margin: 0 0 20px 0; }
        .label { display: block; color: var(--text-labels); font-weight: bold; margin-bottom: 8px; }
        .content { font-size: 1.4rem; line-height: 1.7; margin-bottom: 25px; display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .footer-suggest { margin-top: auto; padding: 40px 0; text-align: center; width: 100%; }
        .suggest-link { color: #3b82f6; text-decoration: underline; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>معاني الكلمات</h1>
        <button onclick="toggleTheme()" id="themeBtn">الوضع المظلم</button>
    </div>

    <div class="search-container">
        <input type="text" id="wordInput" placeholder="أكتب كلمة..." autocomplete="off" onkeydown="if(event.key==='Enter') handleSearch()">
        <button id="searchBtn" onclick="handleSearch()">بحث</button>
    </div>

    <div id="loader" class="loader-wrapper">
        <div class="dad-loader">ض</div>
        <p style="opacity: 0.6;">جاري البحث...</p>
    </div>

    <div id="resultArea" style="width: 100%;"></div>
</div>

<div class="footer-suggest" id="footerArea">
    <span class="suggest-link" onclick="showSuggest()">هل لديك كلمة جديدة؟</span>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwRF6ZycN-hWpqWu2LW3LaU3Bgf7mQhJeORX6xKiXJ0EKInKU6weTgfZYrANBDt6Lnc/exec";

    function applySavedTheme() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('themeBtn').innerText = savedTheme === 'dark' ? "الوضع النهاري" : "الوضع المظلم";
    }

    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        document.getElementById('themeBtn').innerText = newTheme === 'dark' ? "الوضع النهاري" : "الوضع المظلم";
    }

    async function handleSearch() {
        const input = document.getElementById('wordInput');
        const resArea = document.getElementById('resultArea');
        const loader = document.getElementById('loader');
        const query = input.value.trim();

        if (!query) return;
        resArea.innerHTML = '';
        loader.style.display = 'block';

        try {
            const res = await fetch(`${API_URL}?q=${encodeURIComponent(query)}`);
            const data = await res.json();
            loader.style.display = 'none';
            if (data.found) {
                resArea.innerHTML = `
                    <div class="result-card">
                        <h2>${data.word}</h2>
                        <span class="label">الجملة الأولى:</span>
                        <span class="content">${data.sentence1}</span>
                        <span class="label">الجملة الثانية:</span>
                        <span class="content">${data.sentence2}</span>
                    </div>`;
            } else {
                resArea.innerHTML = '<p style="text-align:center; opacity:0.6; margin-top:20px;">الكلمة غير موجودة.</p>';
            }
        } catch (e) {
            loader.style.display = 'none';
            resArea.innerHTML = '<p style="color:red; text-align:center;">خطأ في الاتصال.</p>';
        }
    }

    applySavedTheme();
</script>
</body>
</html>
